<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core | Neural Interface</title>
    <meta name="description" content="A high-performance, modern web interface deployed via Netlify.">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Nexus Core Interface">
    <meta property="og:description" content="Experience a sleek, modern web design built with best practices.">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    <main class="container">
        <div class="glass-shield"></div>
        <header class="interface-header">
            <div class="status-badge">System: <span id="system-state">Online</span></div>
            <h1 id="main-heading" class="typewriter">Initializing...</h1>
        </header>
        <section class="content-hub">
            <div class="terminal-window">
                <p id="sub-text">Establishing secure connection to Netlify Node...</p>
                <div id="dynamic-console"></div>
            </div>
        </section>
        <footer>
            <p>&copy; 2024 NEXUS CORE. Protocol v4.0.2. Fully Optimized.</p>
        </footer>
    </main>
    <script src="script.js"></script> <!-- Link to your JavaScript file -->
</body>
</html>
